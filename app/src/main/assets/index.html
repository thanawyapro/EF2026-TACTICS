        function App() {
            const [language, setLanguage] = useState(() => localStorage.getItem('ef26_lang') || 'en');
            const t = useCallback((key) => TRANSLATIONS[language]?.[key] || TRANSLATIONS['en']?.[key] || key, [language]);

            const [currentTab, setCurrentTab] = useState('dashboard');
            const [matches, setMatches] = useState(() => {
                const stored = localStorage.getItem('ef26_matches');
                return stored ? JSON.parse(stored) : INITIAL_MATCHES;
            });
            const [profiles, setProfiles] = useState(() => {
                const stored = localStorage.getItem('ef26_profiles');
                return stored ? JSON.parse(stored) : DEFAULT_PROFILES;
            });
            const [activeProfileId, setActiveProfileId] = useState('1');
            const [toasts, setToasts] = useState([]);
            const [isPro, setIsPro] = useState(() => localStorage.getItem('ef26_ispro') === 'true');

            const [sidebarOpen, setSidebarOpen] = useState(false);

            const [metaLastGrounded, setMetaLastGrounded] = useState(() => localStorage.getItem('ef26_meta_last_grounded') || 'Never Scanned');

            const [customCoords, setCustomCoords] = useState(() => {
                const stored = localStorage.getItem('ef26_custom_coords');
                return stored ? JSON.parse(stored) : {};

            useEffect(() => {
                window.getCurrentCustomCoords = () => customCoords;
            }, [customCoords]);

            const [isProModalOpen, setIsProModalOpen] = useState(false);

                localStorage.setItem('ef26_lang', language);
                document.documentElement.dir = language === 'ar' ? 'rtl' : 'ltr';
                document.documentElement.lang = language;
            }, [language]);

            useEffect(() => {
                localStorage.setItem('ef26_matches', JSON.stringify(matches));
            }, [matches]);

            useEffect(() => {
                localStorage.setItem('ef26_profiles', JSON.stringify(profiles));
            }, [profiles]);

            useEffect(() => {
                localStorage.setItem('ef26_ispro', isPro.toString());
            }, [isPro]);

            useEffect(() => {
                localStorage.setItem('ef26_accent', accentColor);
            }, [accentColor]);

            useEffect(() => {
                localStorage.setItem('ef26_meta_formation', metaFormation);
            }, [metaFormation]);

            useEffect(() => {
                localStorage.setItem('ef26_meta_description', metaDescription);
            }, [metaDescription]);

            useEffect(() => {
                localStorage.setItem('ef26_meta_last_grounded', metaLastGrounded);
            }, [metaLastGrounded]);

                const id = Date.now();
                setToasts(prev => [...prev, { id, text, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 3000);
            }, []);

            // Mobile slide-out bottom navigation animation state
            const [isNavSlidOut, setIsNavSlidOut] = useState(false);

            const navigateToTab = useCallback((targetTab) => {
                if (targetTab === currentTab) return;
                
                // Trigger slide-out animation of bottom bar
                setIsNavSlidOut(true);
                
                // Wait for the slide-out animation (200ms) before switching tab
                setTimeout(() => {
                    setCurrentTab(targetTab);
                    
                    // Allow UI to update, then slide bottom bar smoothly back in
                    setTimeout(() => {
                        setIsNavSlidOut(false);
                    }, 50);
                }, 200);
            }, [currentTab]);

                { id: 'dashboard', icon: '🏠' },
                { id: 'match_report', icon: '📊' },
                { id: 'tactics_generator', icon: '🤖' },
                { id: 'performance_tracker', icon: '📈' },
                { id: 'script_detector', icon: '🔮' }

                return bottomTabItems.findIndex(item => item.id === currentTab);

                            </div>
                            <button onClick={() => setSidebarOpen(false)} class="md:hidden text-gray-400 hover:text-white p-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                        </div>
                        
                        <nav class="flex-1 overflow-y-auto px-4 py-6 space-y-1">
                            {[
                                { id: 'dashboard', icon: '🏠' },
                                { id: 'match_report', icon: '📊' },
                                { id: 'tactics_generator', icon: '🤖' },
                                { id: 'custom_formation', icon: '🎨' },
                                { id: 'meta_counter', icon: '⚔️' },
                                { id: 'sub_tactics', icon: '🎯' },
                                { id: 'quick_profiles', icon: '⚡' },
                                { id: 'performance_tracker', icon: '📈' },
                                { id: 'script_detector', icon: '🔮' }
                            ].map(item => (
                                <button key={item.id} onClick={() => { navigateToTab(item.id); setSidebarOpen(false); }}
                                    class={`w-full flex items-center gap-3.5 px-4 py-3 rounded-lg font-medium transition-all ${currentTab === item.id ? 'bg-primary/10 text-primary border border-primary/30 glow-active' : 'text-gray-400 hover:text-white hover:bg-surface2'}`}>
                                    <span class="text-lg">{item.icon}</span>
                                    <span class="text-sm tracking-wide">{t(item.id)}</span>
                                </button>
                            ))}
                        </nav>

                        {/* Sidebar Bottom Actions */}
                        <div class="p-4 border-t border-border flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-primary to-secondary flex items-center justify-center text-xs font-bold text-white shadow-lg">PRO</div>
                                <div>
                                    <p class="text-xs font-semibold">{isPro ? 'Pro Active' : 'EF21 Pilot'}</p>
                                    <button onClick={() => setIsProModalOpen(true)} class="text-[10px] text-primary hover:underline">
                                        {isPro ? 'Manage tier' : 'Upgrade to PRO'}
                                    </button>
                                </div>
                            </div>
                            <button onClick={() => setIsSettingsOpen(true)} class="p-2 text-gray-400 hover:text-white rounded-lg hover:bg-surface2 transition-all">
                                ⚙️
                            </button>
                        </div>
                    </aside>

                    {/* Mobile Navigation Header */}
                    <div class="md:hidden h-14 bg-surface px-4 flex items-center justify-between border-b border-border">

                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                        </button>
                        <div class="flex items-center gap-1.5">
                            <span class="text-lg font-bold font-orbitron tracking-wider text-primary">EF26 TACTICS</span>
                            <span class="bg-primary/20 text-primary text-[7px] font-bold px-1 rounded uppercase tracking-tighter">AI</span>
                        </div>
                        <button onClick={() => setIsSettingsOpen(true)} class="p-2 text-gray-400 hover:text-white">⚙️</button>
                    </div>

                    {/* Master Content Area */}
                    <main class="flex-1 flex flex-col overflow-y-auto p-4 md:p-8 space-y-6">
                        
                        {/* Render active module */}
                        {currentTab === 'dashboard' && (
                            <DashboardModule 
                                matches={matches} 
                                navigate={navigateToTab} 
                                triggerToast={triggerToast} 
                                metaAlertDismissed={metaAlertDismissed} 
                                setMetaAlertDismissed={setMetaAlertDismissed} 
                                isPro={isPro} 
                                setIsProModalOpen={setIsProModalOpen}
                                metaFormation={metaFormation}
                                setMetaFormation={setMetaFormation}
                                metaDescription={metaDescription}
                                setMetaDescription={setMetaDescription}
                                metaLastGrounded={metaLastGrounded}
                                setMetaLastGrounded={setMetaLastGrounded}
                                t={t}
                                language={language}
                            />
                        )}
                        {currentTab === 'match_report' && <MatchReportModule matches={matches} setMatches={setMatches} triggerToast={triggerToast} t={t} language={language} />}
                        {currentTab === 'tactics_generator' && (
                            <TacticsGeneratorModule 
                                triggerToast={triggerToast} 
                                isPro={isPro} 
                                setIsProModalOpen={setIsProModalOpen}
                                profiles={profiles}
                                setProfiles={setProfiles}
                                activeProfileId={activeProfileId}
                                setActiveProfileId={setActiveProfileId}
                                t={t}
                                language={language}
                            />
                        )}
                        {currentTab === 'custom_formation' && (
                            <CustomFormationModule 
                                customCoords={customCoords}
                                setCustomCoords={setCustomCoords}
                                triggerToast={triggerToast}
                                t={t}
                                language={language}
                            />
                        )}
                        {currentTab === 'meta_counter' && <MetaCounterModule triggerToast={triggerToast} profiles={profiles} setProfiles={setProfiles} activeProfileId={activeProfileId} setActiveProfileId={setActiveProfileId} t={t} language={language} />}
                        {currentTab === 'sub_tactics' && <SubTacticsModule triggerToast={triggerToast} t={t} language={language} />}
                        {currentTab === 'quick_profiles' && <QuickProfilesModule profiles={profiles} setProfiles={setProfiles} activeProfileId={activeProfileId} setActiveProfileId={setActiveProfileId} triggerToast={triggerToast} t={t} language={language} />}
                        {currentTab === 'performance_tracker' && <PerformanceTrackerModule matches={matches} setMatches={setMatches} triggerToast={triggerToast} t={t} language={language} />}
                        {currentTab === 'script_detector' && <ScriptDetectorModule matches={matches} triggerToast={triggerToast} isPro={isPro} setIsPro={setIsPro} setIsProModalOpen={setIsProModalOpen} t={t} language={language} />}

                    </main>

                    {/* Bottom Sticky Tab-Bar for ultra responsive mobile experience */}
                    <div class={`md:hidden flex bg-surface border-t border-border sticky bottom-0 left-0 w-full justify-around py-2.5 px-1 z-30 transition-transform duration-300 ease-in-out relative ${isNavSlidOut ? 'translate-y-full' : 'translate-y-0'}`}>
                        {/* Horizontal sliding indicators */}
                        {activeTabIdx !== -1 && (
                            <>
                                {/* Sliding top line */}
                                <div 
                                    style={{ left: `${activeTabIdx * 20}%`, width: '20%' }}
                                    class="absolute top-0 h-0.5 bg-gradient-to-r from-primary to-secondary transition-all duration-300 ease-out shadow-[0_0_8px_#00d4ff]"
                                ></div>
                                {/* Sliding highlight glow */}
                                <div 
                                    style={{ left: `${activeTabIdx * 20 + 2.5}%`, width: '15%' }}
                                    class="absolute top-1 bottom-1 bg-gradient-to-tr from-primary/10 to-secondary/10 rounded-xl transition-all duration-300 ease-out pointer-events-none"
                                ></div>
                            </>
                        )}

                        {bottomTabItems.map(item => (
                            <button key={item.id} onClick={() => navigateToTab(item.id)} class="flex flex-col items-center justify-center w-1/5 relative z-10 py-1 select-none">
                                <span class={`text-lg transition-transform duration-200 ${currentTab === item.id ? 'scale-110' : 'opacity-85'}`}>{item.icon}</span>
                                <span class={`text-[8px] sm:text-[10px] uppercase tracking-tighter truncate max-w-full px-1 transition-colors duration-200 ${currentTab === item.id ? 'text-primary font-bold' : 'text-gray-400'}`}>{t(item.id)}</span>
                            </button>
                        ))}
                    </div>

                    {/* Toast Notification Container */}
                    <div class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
                        {toasts.map(toast => (
                            <div key={toast.id} class={`px-4 py-3 rounded-lg shadow-2xl border flex items-center gap-2.5 text-sm font-semibold transition-all duration-300 transform translate-y-0 ${
                                toast.type === 'success' ? 'bg-success/20 border-success text-success' :
                                toast.type === 'error' ? 'bg-danger/20 border-danger text-danger' :
                                toast.type === 'warning' ? 'bg-accent/20 border-accent text-accent' :
                                'bg-primary/20 border-primary text-primary'
                            }`}>
                                <span class="text-base">{toast.type === 'success' ? '✅' : toast.type === 'error' ? '❌' : toast.type === 'warning' ? '⚠️' : 'ℹ️'}</span>
                                <span>{toast.text}</span>
                            </div>
                        ))}
                    </div>

                    {/* Settings Modal */}
                    {isSettingsOpen && (
                        <div class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                            <div class="bg-surface max-w-md w-full rounded-2xl border border-border overflow-hidden">
                                <div class="px-6 py-4 border-b border-border flex items-center justify-between">
                                    <h3 class="text-xl font-bold font-orbitron text-white">⚙️ {t('app_settings')}</h3>
                                    <button onClick={() => setIsSettingsOpen(false)} class="text-gray-400 hover:text-white font-bold">✕</button>
                                </div>
                                <div class="p-6 space-y-6">
                                    {/* Language Selector */}
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">{t('language')}</label>
                                        <select 
                                            value={language} 
                                            onChange={(e) => {
                                                setLanguage(e.target.value);
                                                triggerToast(`Language switched to ${e.target.value.toUpperCase()}!`, 'success');
                                            }}
                                            class="w-full bg-surface2 border border-border rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-primary font-medium"
                                        >
                                            <option value="en">English (US)</option>
                                            <option value="ar">العربية (Arabic)</option>
                                            <option value="es">Español (Spanish)</option>
                                            <option value="ja">日本語 (Japanese)</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">{t('theme_accent')}</label>
                                        <div class="flex gap-3">
                                            {['#00d4ff', '#10b981', '#7c3aed', '#f59e0b', '#ef4444'].map(color => (
                                                <button key={color} onClick={() => { setAccentColor(color); triggerToast('Accent color updated!', 'success'); }}
                                                    style={{ backgroundColor: color }} class={`w-8 h-8 rounded-full border-2 transition-all ${accentColor === color ? 'border-white scale-110 shadow-lg' : 'border-transparent hover:scale-105'}`}></button>
                                            ))}
                                        </div>
                                    </div>
                                    <div class="flex items-center justify-between p-3 bg-surface2 rounded-xl border border-border">
                                        <div>
                                            <p class="font-bold text-sm">{t('demo_pro_mode')}</p>
                                            <p class="text-xs text-gray-400">{t('unlock_advanced')}</p>
                                        </div>
                                        <div class="relative inline-flex items-center cursor-pointer">
                                            <input type="checkbox" checked={isPro} onChange={(e) => { setIsPro(e.target.checked); triggerToast(e.target.checked ? 'PRO features unlocked!' : 'Demo PRO mode deactivated.', 'info'); }} class="sr-only peer"/>
                                            <div class="w-11 h-6 bg-gray-700 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                                        </div>
                                    </div>
                                    <div class="space-y-2">
                                        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">{t('backup_operations')}</label>
                                        <div class="grid grid-cols-2 gap-2">
                                            <button onClick={() => {
                                                const raw = JSON.stringify({ matches, profiles });
                                                const blob = new Blob([raw], { type: 'application/json' });
                                                const url = URL.createObjectURL(blob);
                                                const link = document.createElement('a');
                                                link.href = url;
                                                link.download = 'ef26_tactics_backup.json';
                                                link.click();
                                                triggerToast('Tactics data exported!', 'success');
                                            }} class="bg-surface2 hover:bg-gray-800 text-xs py-2 px-3 rounded-lg border border-border text-center">{t('export_data')}</button>
                                            
                                            <button onClick={() => {
                                                const fileInput = document.createElement('input');
                                                fileInput.type = 'file';
                                                fileInput.accept = 'application/json';
                                                fileInput.onchange = (e) => {
                                                    const file = e.target.files[0];
                                                    if (!file) return;
                                                    const reader = new FileReader();
                                                    reader.onload = (evt) => {
                                                        try {
                                                            const obj = JSON.parse(evt.target.result);
                                                            if (obj.matches) setMatches(obj.matches);
                                                            if (obj.profiles) setProfiles(obj.profiles);
                                                            triggerToast('Data imported successfully!', 'success');
                                                        } catch (err) {
                                                            triggerToast('Invalid file format!', 'error');
                                                        }
                                                    };
                                                    reader.readAsText(file);
                                                };
                                                fileInput.click();
                                            }} class="bg-surface2 hover:bg-gray-800 text-xs py-2 px-3 rounded-lg border border-border text-center">{t('import_data')}</button>
                                        </div>
                                        <button onClick={() => {
                                            if (confirm('Are you absolutely sure you want to hard reset all tactics, stats, and custom profiles?')) {
                                                localStorage.removeItem('ef26_matches');
                                                localStorage.removeItem('ef26_profiles');
                                                setMatches(INITIAL_MATCHES);
                                                setProfiles(DEFAULT_PROFILES);
                                                triggerToast('App reset successful!', 'warning');
                                                setIsSettingsOpen(false);
                                            }
                                        }} class="w-full bg-danger/20 hover:bg-danger text-danger hover:text-white text-xs font-semibold py-2 rounded-lg border border-danger/30 transition-all text-center mt-2">{t('hard_reset')}</button>
                                    </div>
                                </div>
                                <div class="bg-surface2 p-4 text-center text-xs text-gray-400 border-t border-border">
                                    <p class="font-bold">EF26 Tactics v1.0.0</p>
                                    <p>Made exclusively for competitive eFootball analysis</p>
                                </div>
                            </div>
                        </div>

        const getApiKey = () => {
            if (window.AndroidInterface && typeof window.AndroidInterface.getApiKey === 'function') {
                return window.AndroidInterface.getApiKey();
            }
            return '';
        };

        async function callGemini(prompt, systemInstruction = "") {
            const apiKey = getApiKey();
            if (!apiKey || apiKey === 'MY_GEMINI_API_KEY') {
                throw new Error("Gemini API key is not configured. Please enter your license key or configure Secrets.");
            }
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{
                    parts: [{ text: prompt }]
                }],
                generationConfig: {
                    responseMimeType: "application/json"
                }
            };
            if (systemInstruction) {
                payload.systemInstruction = {
                    parts: [{ text: systemInstruction }]
                };
            }
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`Cloud API returned: ${response.status} - ${errText}`);
            }
            const data = await response.json();
            if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
                return data.candidates[0].content.parts[0].text;

        // ------------------------- MODULE 3: TACTICS GENERATOR -------------------------
        function TacticsGeneratorModule({ triggerToast, isPro, setIsProModalOpen, profiles, setProfiles, activeProfileId, setActiveProfileId, t, language }) {
            const [teamName, setTeamName] = useState('My Custom Squad');
            const [formation, setFormation] = useState('4-3-3');
            const [playstyle, setPlaystyle] = useState('Possession');
            const [strength, setStrength] = useState(8);
            const [weakAreas, setWeakAreas] = useState([]);
            const [manager, setManager] = useState('Guardiola');
            const [loading, setLoading] = useState(false);
            const [outputTactic, setOutputTactic] = useState(null);

            // Gemini Pro intelligence states
            const [geminiResult, setGeminiResult] = useState(null);
            const [geminiLoading, setGeminiLoading] = useState(false);

            const handleToggleWeak = (area) => {
                setWeakAreas(prev => prev.includes(area) ? prev.filter(a => a !== area) : [...prev, area]);
            };

            const handleGeminiAnalyze = async () => {
                if (weakAreas.length === 0) {
                    triggerToast('Please select at least one Weak Area to guide Gemini!', 'warning');
                    return;
                }

                setGeminiLoading(true);
                setGeminiResult(null);
                setOutputTactic(null); // Clear local optimization to focus on AI recommendations

                const systemInstruction = "You are eFootball Intelligence engine, designed to find tactical responses. You speak with high-level military-soccer realism, focused on spatial configurations, player roles, and counter-play.";

                const prompt = `Analyze current eFootball Meta game to suggest a "Best-fit Formation" for the user.

- Current Community Meta Formations:
${JSON.stringify(META_FORMATIONS, null, 2)}

- User's Specific Weak Areas:
${weakAreas.join(", ")}

- Preferred Playstyle: ${playstyle}
- Chosen Manager: ${manager}

Task: Choose EXACTLY ONE Best-fit formation from this allowed list of formations: ${JSON.stringify(FORMATIONS)}.
This formation must cover their weak areas while remaining a superb tactical counter to the active meta.

You must respond with a JSON object. Ensure the format is strictly valid JSON. Do not include markdown code block tags. The JSON object must contain exactly these keys:
{
  "bestFormation": "The selected formation, must be an EXACT match from the allowed formations list",
  "analysis": "A brief 2-3 sentence high-impact tactical analysis on why this formation patches the chosen weak areas and counters high-popularity meta loops.",
  "preMatchSetup": "Step-by-step instructions (e.g., tight mark their AMF, set fullbacks to defensive, use a Box-to-Box midfielder to cover spaces).",
  "inGameAdjustment": "Sub-tactical triggers (e.g., enable Gegenpress if losing by min 60, slow tempo, switch to wide possession)."
}`;

                try {
                    const apiKey = getApiKey();
                    
                    if (!apiKey || apiKey === 'MY_GEMINI_API_KEY') {
                        // Simulated fallback mode with high-quality term accuracy
                        setTimeout(() => {
                            const responses = [
                                {
                                    bestFormation: '4-1-4-1',
                                    analysis: `The 4-1-4-1 setup provides a dense central block that perfectly addresses your ${weakAreas.join(' & ')} vulnerability. The energetic wide midfielders double-team long-ball wing runners, neutralizing the popular 4-2-2-2 spam.`,
                                    preMatchSetup: `Set your sole DMF to 'Anchor Man' to protect the center backs. Enable defensive instruct profiles on your LB and RB.`,
                                    inGameAdjustment: `If being pressed hard, trigger direct lateral passing. Enable 'Counter Target' on your lone CF to bypass high back lines.`,
                                    isSimulated: true
                                },
                                {
                                    bestFormation: '5-3-2',
                                    analysis: `Switching to a 5-3-2 format blocks the central loops of the 4-1-2-1-2 through-ball spammers. Having 3 center-backs guarantees physical aerial coverage to reinforce your ${weakAreas.join(' & ')} gaps.`,
                                    preMatchSetup: `Configure your side centerbacks to 'Build-Up' roles. Instruct the defensive midfielders to play compact, restricting AMF lane shifts.`,
                                    inGameAdjustment: `Min 70 trigger 'Defense Depth' to form a solid lead safeguard. Direct long over-the-top balls to agile counters.`,
                                    isSimulated: true
                                },
                                {
                                    bestFormation: '3-5-2',
                                    analysis: `With ${weakAreas.join(' and ')} requiring support, the 3-5-2 floods the midfield, easily choking the 4-3-3 high pressing machines. Deep wingbacks ensure rapid defensive transition capability.`,
                                    preMatchSetup: `Designate one central CMF as 'Box-to-Box' and another as 'Tiki-Taka' handler. Set wide LM/RM to tracking roles.`,
                                    inGameAdjustment: `When possession is won, transition through wide channels. Slow passing speed across center and exploit wing overlaps.`,
                                    isSimulated: true
                                }
                            ];
                            
                            let chosen = responses[0];
                            if (weakAreas.includes('Defense') || weakAreas.includes('Physicality')) {
                                chosen = responses[1];
                            } else if (weakAreas.includes('Midfield') || weakAreas.includes('Technique')) {
                                chosen = responses[2];
                            }
                            
                            setGeminiResult(chosen);
                            setGeminiLoading(false);
                            triggerToast('Simulated Gemini Analysis loaded! Configure your API key in the AI Studio Secrets panel to activate live AI generation.', 'info');
                        }, 2200);
                        return;
                    }

                    const responseText = await callGemini(prompt, systemInstruction);
                    
                    let parsed;
                    try {
                        const cleanJson = responseText.replace(/```json/gi, '').replace(/```/g, '').trim();
                        parsed = JSON.parse(cleanJson);
                    } catch (err) {
                        console.error("JSON parsing error, raw response was:", responseText);
                        parsed = {
                            bestFormation: formation || '4-1-4-1',
                            analysis: responseText,
                            preMatchSetup: 'Anchor defensive structures and leverage high-coverage marking on their advanced playmaker.',
                            inGameAdjustment: 'Shift to a lower defensive depth and implement counter-trap parameters.'
                        };
                    }

                    setGeminiResult({
                        bestFormation: parsed.bestFormation || '4-1-4-1',
                        analysis: parsed.analysis || 'Strategic formation reconfiguration designed to limit opposition transitions and protect lanes.',
                        preMatchSetup: parsed.preMatchSetup || 'Position double holding DMF anchors to insulate defensive center blocks.',
                        inGameAdjustment: parsed.inGameAdjustment || 'Toggle sub-tactics based on active possession tempo triggers.',
                        isSimulated: false
                    });
                    
                    triggerToast('Live Gemini Counter Blueprint successfully integrated! 🧠', 'success');

                } catch (error) {
                    console.error(error);
                    triggerToast(`Cloud API Error: ${error.message}`, 'error');
                } finally {
                    setGeminiLoading(false);
                }
            };

            const saveGeminiTactic = () => {
                if (!geminiResult) return;
                const newProf = {
                    id: 'gem_prof_' + Date.now(),
                    name: `🔮 ANTI-META (${geminiResult.bestFormation})`,
                    formation: geminiResult.bestFormation,
                    playstyle: playstyle,
                    details: `Gemini counter to active meta matching ${weakAreas.join(', ')} covers: ${geminiResult.analysis}`,
                    isCustom: true,
                    subTactics: ['Gegenpress', 'Deep Defensive Line']
                };
                setProfiles(prev => [newProf, ...prev]);
                if (typeof setActiveProfileId === 'function') {
                    setActiveProfileId(newProf.id);
                }
                triggerToast('Saved Gemini Counter to Active Quick Profile! ⚔️', 'success');
            };

            const handleGenerate = (e) => {
                e.preventDefault();
                setLoading(true);
                
                setTimeout(() => {
                    setLoading(false);
                    
                    // Generate cohesive details on selected parameters
                    let support = 6;
                    let defLine = 7;
                    let defenseBuild = "Front Containment";
                    let why = "";
                    let counterWeakness = "";

                    if (manager === 'Guardiola') {
                        support = 3;
                        defLine = 9;
                        why = "Heavily centered around suffocating midfield overloads. Utilizes rapid spatial triangles to force defenders to break structure. Highly robust against disorganized teams.";
                        counterWeakness = "Vulnerable to sudden high-speed counter wingers sprinting during possession turn-over.";
                    } else if (manager === 'Ancelotti') {
                        support = 7;
                        defLine = 5;
                        defenseBuild = "All Out Defense";
                        why = "Balanced and flexible. High-octane individual player parameters allow fast adjustments and spatial awareness. Excellent transitional defense.";
                        counterWeakness = "Can struggle against extreme midblock overload compact strategies.";
                    } else if (manager === 'Mourinho') {
                        support = 8;
                        defLine = 2;
                        defenseBuild = "All Out Defense";
                        why = "Ultimate compact defensive shield designed to frustrate the opponent. Forces attackers to bottleneck wide then launches robust long clears to target attackers.";
                        counterWeakness = "Gives up high possession, easily penalizing poor low-block marking ratings.";
                    } else { // Custom / Klopp
                        support = 5;
                        defLine = 8;
                        why = "Heavy frontline trapping that forces opponent centerbacks to pass wide. Demands intense physicality ratings from all players.";
                        counterWeakness = "Vulnerable to clean over-the-top pass spams that bypass the trapping midfield.";
                    }

                    setOutputTactic({
                        teamName,
                        formation,
                        playstyle,
                        attacking: {
                            buildUp: playstyle === 'Possession' ? 'Short Pass' : 'Long Ball',
                            area: 'Wide',
                            positioning: 'Maintain Formation',
                            support,
                            players: strength > 7 ? 8 : 5
                        },
                        defensive: {
                            line: defLine,
                            compactness: strength > 7 ? 8 : 6,
                            intensity: strength > 6 ? 9 : 6,
                            containment: defenseBuild
                        },
                        roles: [
                            { pos: 'GK', role: 'Sweeper Keeper (Offensive)' },
                            { pos: 'CB', role: 'Destroyer (Physical marker)' },
                            { pos: 'DMF', role: 'Anchor Man (Protective block)' },
                            { pos: 'CMF', role: 'Box-to-Box (High stamina workhorse)' },
                            { pos: 'CF', role: 'Goal Poacher (Agile speed finisher)' }
                        ],
                        why,
                        counterWeakness
                    });

                    triggerToast('AI Squad tactics optimized successfully!', 'success');
                }, 1200);
            };

            const exportAsJSON = () => {
                if (!outputTactic) return;
                try {
                    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(outputTactic, null, 2));
                    const downloadAnchorNode = document.createElement('a');
                    downloadAnchorNode.setAttribute("href", dataStr);
                    downloadAnchorNode.setAttribute("download", `${outputTactic.teamName.replace(/\s+/g, '_')}_tactic.json`);
                    document.body.appendChild(downloadAnchorNode);
                    downloadAnchorNode.click();
                    downloadAnchorNode.remove();
                    triggerToast('Tactical blueprint JSON exported!', 'success');
                } catch (e) {
                    triggerToast('Failed to export JSON blueprint.', 'error');
                }
            };

            const exportAsImage = () => {
                if (!outputTactic) return;
                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = 800;
                    canvas.height = 1000;
                    const ctx = canvas.getContext('2d');

                    // Base visual background
                    const outerGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                    outerGrad.addColorStop(0, '#0a0f1d');
                    outerGrad.addColorStop(0.5, '#05070a');
                    outerGrad.addColorStop(1, '#0c1626');
                    ctx.fillStyle = outerGrad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // Grid line vectors
                    ctx.strokeStyle = 'rgba(0, 212, 255, 0.04)';
                    ctx.lineWidth = 1;
                    const gridSize = 40;
                    for (let x = 0; x < canvas.width; x += gridSize) {
                        ctx.beginPath();
                        ctx.moveTo(x, 0);
                        ctx.lineTo(x, canvas.height);
                        ctx.stroke();
                    }
                    for (let y = 0; y < canvas.height; y += gridSize) {
                        ctx.beginPath();
                        ctx.moveTo(0, y);
                        ctx.lineTo(canvas.width, y);
                        ctx.stroke();
                    }

                    // Luxury frame borders
                    ctx.strokeStyle = '#f59e0b';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(10, 10, canvas.width - 20, canvas.height - 20);

                    ctx.strokeStyle = 'rgba(0, 212, 255, 0.25)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(18, 18, canvas.width - 36, canvas.height - 36);

                    // Heading Header
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 30px Orbitron, sans-serif'; 
                    ctx.textAlign = 'center';
                    ctx.fillText(outputTactic.teamName.toUpperCase(), canvas.width / 2, 70);

                    // Subtitle
                    ctx.font = 'bold 14px sans-serif';
                    ctx.fillStyle = '#00d4ff';
                    ctx.letterSpacing = '1px';
                    ctx.fillText(`MAPPED EFOOTBALL TACTICAL MATRIX (${outputTactic.formation})`, canvas.width / 2, 105);

                    // Separator vector
                    ctx.strokeStyle = 'rgba(0, 212, 255, 0.15)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(40, 125);
                    ctx.lineTo(canvas.width - 40, 125);
                    ctx.stroke();

                    // Left Block: Tactical factor data
                    ctx.textAlign = 'left';
                    ctx.fillStyle = '#00d4ff';
                    ctx.font = 'bold 18px Orbitron, sans-serif';
                    ctx.fillText("⚔️ OFFENSIVE MATRIX", 50, 170);

                    ctx.font = '15px sans-serif';
                    ctx.fillStyle = '#cbd5e1';
                    ctx.fillText(`Playstyle:`, 50, 210);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(outputTactic.playstyle, 185, 210);

                    ctx.fillStyle = '#cbd5e1';
                    ctx.fillText(`Build Up:`, 50, 245);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(outputTactic.attacking.buildUp, 185, 245);

                    ctx.fillStyle = '#cbd5e1';
                    ctx.fillText(`Attacking Area:`, 50, 280);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(outputTactic.attacking.area, 185, 280);

                    ctx.fillStyle = '#cbd5e1';
                    ctx.fillText(`Support Range:`, 50, 315);
                    ctx.fillStyle = '#f59e0b';
                    ctx.fillText(`${outputTactic.attacking.support}/10`, 185, 315);

                    // Defensive parameters block
                    ctx.fillStyle = '#ff4b4b';
                    ctx.font = 'bold 18px Orbitron, sans-serif';
                    ctx.fillText("🛡️ DEFENSIVE MATRIX", 50, 390);

                    ctx.font = '15px sans-serif';
                    ctx.fillStyle = '#cbd5e1';
                    ctx.fillText(`Defensive Line:`, 50, 430);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(`${outputTactic.defensive.line}/10`, 185, 430);

                    ctx.fillStyle = '#cbd5e1';
                    ctx.fillText(`Compactness:`, 50, 465);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(`${outputTactic.defensive.compactness}/10`, 185, 465);

                    ctx.fillStyle = '#cbd5e1';
                    ctx.fillText(`Press Intensity:`, 50, 500);
                    ctx.fillStyle = '#ff4b4b';
                    ctx.fillText(`${outputTactic.defensive.intensity}/10`, 185, 500);

                    ctx.fillStyle = '#cbd5e1';
                    ctx.fillText(`Containment:`, 50, 535);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(outputTactic.defensive.containment, 185, 535);

                    // Right Block: Tactical pitch drawing
                    const pitchX = 420;
                    const pitchY = 150;
                    const pitchWidth = 330;
                    const pitchHeight = 410;

                    // Draw field grass bounds
                    ctx.fillStyle = '#0f2416';
                    ctx.fillRect(pitchX, pitchY, pitchWidth, pitchHeight);
                    ctx.strokeStyle = 'rgba(0, 212, 255, 0.25)';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(pitchX, pitchY, pitchWidth, pitchHeight);

                    // Draw pitch segments
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.18)';
                    ctx.strokeRect(pitchX + 15, pitchY + 15, pitchWidth - 30, pitchHeight - 30);
                    ctx.beginPath();
                    ctx.moveTo(pitchX + 15, pitchY + pitchHeight / 2);
                    ctx.lineTo(pitchX + pitchWidth - 15, pitchY + pitchHeight / 2);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(pitchX + pitchWidth / 2, pitchY + pitchHeight / 2, 45, 0, 2 * Math.PI);
                    ctx.stroke();
                    ctx.strokeRect(pitchX + pitchWidth / 2 - 70, pitchY + 15, 140, 65);
                    ctx.strokeRect(pitchX + pitchWidth / 2 - 70, pitchY + pitchHeight - 80, 140, 65);

                    // Placement of players based on selected COORDS dictionary
                    const customCoords = window.getCurrentCustomCoords?.() || {};
                    const positionsList = customCoords[outputTactic.formation] || COORDS[outputTactic.formation] || COORDS['4-3-3'];
                    positionsList.forEach(pos => {
                        const worldX = pitchX + 15 + (pos.x / 100) * (pitchWidth - 30);
                        const worldY = pitchY + 15 + (pos.y / 100) * (pitchHeight - 30);

                        ctx.beginPath();
                        ctx.arc(worldX, worldY, 14, 0, 2 * Math.PI);
                        ctx.fillStyle = 'rgba(0, 212, 255, 0.35)';
                        ctx.fill();

                        ctx.beginPath();
                        ctx.arc(worldX, worldY, 11, 0, 2 * Math.PI);
                        ctx.fillStyle = '#0a101d';
                        ctx.strokeStyle = '#00d4ff';
                        ctx.lineWidth = 1.5;
                        ctx.fill();
                        ctx.stroke();

                        ctx.font = 'bold 9px monospace';
                        ctx.fillStyle = '#ffffff';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(pos.r, worldX, worldY);
                    });

                    // Separating line vector
                    ctx.textBaseline = 'alphabetic';
                    ctx.strokeStyle = 'rgba(0, 212, 255, 0.15)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(40, 580);
                    ctx.lineTo(canvas.width - 40, 580);
                    ctx.stroke();

                    // Key roles panel overlay
                    ctx.textAlign = 'left';
                    ctx.fillStyle = '#00d4ff';
                    ctx.font = 'bold 18px Orbitron, sans-serif';
                    ctx.fillText("🔑 CORE TEAM ROLES & ASSIGNMENTS", 50, 615);

                    let roleY = 645;
                    outputTactic.roles.forEach((r) => {
                        ctx.fillStyle = '#f59e0b';
                        ctx.fillRect(50, roleY - 12, 35, 16);
                        ctx.fillStyle = '#141d2f';
                        ctx.font = 'bold 10px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText(r.pos, 67, roleY);

                        ctx.font = '14px sans-serif';
                        ctx.fillStyle = '#ffffff';
                        ctx.textAlign = 'left';
                        ctx.fillText(r.role, 100, roleY);
                        
                        roleY += 30;
                    });

                    // Analysis synopsis block
                    const analysisY = 800;
                    ctx.fillStyle = 'rgba(0, 212, 255, 0.03)';
                    ctx.strokeStyle = 'rgba(52, 211, 153, 0.2)';
                    ctx.lineWidth = 1;
                    ctx.fillRect(40, analysisY, canvas.width - 80, 120);
                    ctx.strokeRect(40, analysisY, canvas.width - 80, 120);

                    ctx.fillStyle = '#34d399';
                    ctx.font = 'bold 14px Orbitron, sans-serif';
                    ctx.fillText("💡 SQUAD STRATEGY SYNOPSIS", 55, analysisY + 28);

                    ctx.font = '12px sans-serif';
                    ctx.fillStyle = '#cbd5e1';
                    
                    const maxTextWidth = canvas.width - 110;
                    const wrapText = (text, x, y, lineHeight, maxW) => {
                        const words = text.split(' ');
                        let line = '';
                        let currentY = y;
                        for(let n = 0; n < words.length; n++) {
                            let testLine = line + words[n] + ' ';
                            let metrics = ctx.measureText(testLine);
                            let testWidth = metrics.width;
                            if (testWidth > maxW && n > 0) {
                                ctx.fillText(line, x, currentY);
                                line = words[n] + ' ';
                                currentY += lineHeight;
                            } else {
                                line = testLine;
                            }
                        }
                        ctx.fillText(line, x, currentY);
                    };

                    wrapText(outputTactic.why, 55, analysisY + 54, 18, maxTextWidth);

                    // Footer trademark text
                    ctx.fillStyle = '#475569';
                    ctx.font = 'italic 11px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText("Generated and certified via eFootball Tactical Analyzer Software", canvas.width / 2, 960);

                    // Trigger direct canvas overlay download
                    const imgUrl = canvas.toDataURL("image/png");
                    const downloadAnchorNode = document.createElement('a');
                    downloadAnchorNode.setAttribute("href", imgUrl);
                    downloadAnchorNode.setAttribute("download", `${outputTactic.teamName.replace(/\s+/g, '_')}_blueprint.png`);
                    document.body.appendChild(downloadAnchorNode);
                    downloadAnchorNode.click();
                    downloadAnchorNode.remove();
                    triggerToast('Tactical blueprint image exported successfully!', 'success');
                } catch (err) {
                    console.error(err);
                    triggerToast('Image export failed. Format fallback: JSON download instead.', 'error');
                }
            };

            return (
                <div class="space-y-6">
                    <div class="flex items-center justify-between border-b border-border pb-4">
                        <div>
                            <h2 class="text-2xl font-bold font-orbitron text-white">🤖 Squad-Specific Tactics Generator</h2>
                            <p class="text-xs text-gray-400">Generate high-fidelity blueprints for specific manager and playstyle</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        {/* Control Box */}
                        <div class="lg:col-span-5 bg-surface rounded-xl border border-border p-5">
                            <form onSubmit={handleGenerate} class="space-y-4">
                                <div>
                                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Squad Profile Name</label>
                                    <input type="text" value={teamName} onChange={e => setTeamName(e.target.value)} class="w-full bg-surface2 border border-border rounded-lg text-xs p-2.5 outline-none focus:border-primary text-white" required/>
                                </div>

                                <div class="grid grid-cols-2 gap-3">
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Preferred Formation</label>
                                        <select value={formation} onChange={e => setFormation(e.target.value)} class="w-full bg-surface2 border border-border rounded-lg text-xs p-2.5 outline-none focus:border-primary">
                                            {FORMATIONS.map(f => <option key={f} value={f}>{f}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Playstyle</label>
                                        <select value={playstyle} onChange={e => setPlaystyle(e.target.value)} class="w-full bg-surface2 border border-border rounded-lg text-xs p-2.5 outline-none focus:border-primary">
                                            <option>Possession</option>
                                            <option>Counter Attack</option>
                                            <option>High Press</option>

        // ------------------------- MODULE: CUSTOM FORMATIONS CREATOR -------------------------
        function CustomFormationModule({ customCoords, setCustomCoords, triggerToast, t, language }) {
            // Retrieve Framer Motion's motion component dynamically with fail-safe fallbacks
            const motion = window.Motion?.motion || window.FramerMotion?.motion || window.Motion || window.FramerMotion;
            const MotionDiv = motion ? motion.div : 'div';

            const [selectedFormation, setSelectedFormation] = useState('4-3-3');
            const [activePlayerIdx, setActivePlayerIdx] = useState(null);
            const [localPlayers, setLocalPlayers] = useState([]);
            const [selectedPlayerIdx, setSelectedPlayerIdx] = useState(null);
            
            const [history, setHistory] = useState([]);
            const dragStartRef = useRef(null);
            const hasDraggedRef = useRef(false);

            const pitchRef = useRef(null);

            const pushToHistory = (stateToPush = localPlayers) => {
                setHistory(prev => [...prev.slice(-19), JSON.parse(JSON.stringify(stateToPush))]);
            };

            const handleUndo = () => {
                if (history.length === 0) return;
                const previousState = history[history.length - 1];
                setLocalPlayers(previousState);
                setHistory(prev => prev.slice(0, -1));
                triggerToast("Reverted last configuration change", "info");
            };

            // Sync with parent customCoords or fallback to original when formation changes
            useEffect(() => {
                const baseCoords = customCoords[selectedFormation] || COORDS[selectedFormation] || COORDS['4-3-3'];
                // Deep copy so that changes in the drawing board are staged before clicking save
                setLocalPlayers(JSON.parse(JSON.stringify(baseCoords)));
                setSelectedPlayerIdx(null);
                setHistory([]); // clear undo stack on layout changes
            }, [selectedFormation, customCoords]);

            const handlePointerDown = (idx, e) => {
                e.preventDefault();
                setActivePlayerIdx(idx);
                setSelectedPlayerIdx(idx);
                // Save current state as potential drag start snapshot before any mutation
                dragStartRef.current = JSON.parse(JSON.stringify(localPlayers));
                hasDraggedRef.current = false;
                // Set pointer capture to handle drags outside boundaries smoothly
                try {
                    e.target.setPointerCapture(e.pointerId);
                } catch (err) {}
            };

            const handlePointerMove = (idx, e) => {
                if (activePlayerIdx !== idx || !pitchRef.current) return;
                const rect = pitchRef.current.getBoundingClientRect();
                
                // standard pointer coordinates
                const xVal = ((e.clientX - rect.left) / rect.width) * 100;
                const yVal = ((e.clientY - rect.top) / rect.height) * 100;

                // Restrict coords between 2% and 98% for clean visual spacing inside the container
                const clampedX = Math.round(Math.max(2, Math.min(98, xVal)));
                const clampedY = Math.round(Math.max(2, Math.min(98, yVal)));

                hasDraggedRef.current = true;

                setLocalPlayers(prev => {
                    const cloned = [...prev];
                    cloned[idx] = { ...cloned[idx], x: clampedX, y: clampedY };
                    return cloned;
                });
            };

            const handlePointerUp = (idx, e) => {
                if (activePlayerIdx === idx) {
                    setActivePlayerIdx(null);
                    try {
                        e.target.releasePointerCapture(e.pointerId);
                    } catch (err) {}

                    if (hasDraggedRef.current && dragStartRef.current) {
                        pushToHistory(dragStartRef.current);
                    }
                    dragStartRef.current = null;
                    hasDraggedRef.current = false;
                }
            };

            const handleRoleChange = (idx, newRole) => {
                pushToHistory(); // Push current state before role modifications
                setLocalPlayers(prev => {
                    const cloned = [...prev];
                    cloned[idx] = { ...cloned[idx], r: newRole };
                    return cloned;
                });

                        const cloned = [...prev];
                        cloned[selectedPlayerIdx] = { 
                            ...cloned[selectedPlayerIdx], 
                            x: defaultPt.x, 
                            y: defaultPt.y

                        return cloned;

        // ------------------------- D3 REUSABLE CHART: WIN-RATE GROWTH TRAJECTORY -------------------------
        function D3WinRateGrowthChart({ matches, t, language }) {
            const svgRef = React.useRef(null);
            const [windowSize, setWindowSize] = useState('cumulative'); // 'cumulative' | 5 | 10
            const [hoveredPoint, setHoveredPoint] = useState(null);

            const chronoMatches = useMemo(() => {
                return matches.slice().reverse(); // Oldest match to newest match
            }, [matches]);

            // Calculate moving average values
            const chartData = useMemo(() => {
                if (chronoMatches.length === 0) return [];
                return chronoMatches.map((m, idx) => {
                    let winRate = 0;
                    if (windowSize === 'cumulative') {
                        const wins = chronoMatches.slice(0, idx + 1).filter(x => x.result === 'W').length;
                        winRate = Math.round((wins / (idx + 1)) * 100);
                    } else {
                        const size = parseInt(windowSize);
                        const start = Math.max(0, idx - size + 1);
                        const subset = chronoMatches.slice(start, idx + 1);
                        const wins = subset.filter(x => x.result === 'W').length;
                        winRate = Math.round((wins / subset.length) * 100);
                    }
                    return {
                        index: idx + 1,
                        match: m,
                        winRate: winRate,
                        result: m.result,
                        score: `${m.myGoals}-${m.opponentGoals}`,
                        oppForm: m.opponentFormation,
                        myForm: m.myFormation,
                        date: m.date
                    };
                });
            }, [chronoMatches, windowSize]);

            useEffect(() => {
                if (!svgRef.current) return;
                const svgElement = d3.select(svgRef.current);
                svgElement.selectAll("*").remove();

                if (chartData.length === 0) return;

                // Margins & responsive setup
                const margin = { top: 15, right: 25, bottom: 25, left: 35 };
                const svgWidth = svgRef.current.clientWidth || 500;
                const svgHeight = 160;

                svgElement.attr("viewBox", `0 0 ${svgWidth} ${svgHeight}`);

                const chartWidth = svgWidth - margin.left - margin.right;
                const chartHeight = svgHeight - margin.top - margin.bottom;

                const g = svgElement.append("g")
                    .attr("transform", `translate(${margin.left}, ${margin.top})`);

                // Scales
                const xScale = d3.scaleLinear()
                    .domain([1, Math.max(2, chartData.length)])
                    .range([0, chartWidth]);

                const yScale = d3.scaleLinear()
                    .domain([0, 100])
                    .range([chartHeight, 0]);

                // Grid lines (y-axis helper lines)
                g.append("g")
                    .attr("class", "grid")
                    .attr("stroke", "#1e293b")
                    .attr("stroke-width", 1)
                    .attr("stroke-opacity", 0.4)
                    .call(d3.axisLeft(yScale)
                        .ticks(5)
                        .tickSize(-chartWidth)
                        .tickFormat("")
                    );

                // X-axis mapping
                const xAxis = d3.axisBottom(xScale)
                    .ticks(Math.min(chartData.length, 12))
                    .tickFormat(d => `G${d}`);

                g.append("g")
                    .attr("transform", `translate(0, ${chartHeight})`)
                    .attr("class", "x-axis")
                    .call(xAxis)
                    .call(g => g.select(".domain").attr("stroke", "#334155"))
                    .call(g => g.selectAll(".tick line").attr("stroke", "#334155"))
                    .call(g => g.selectAll(".tick text")
                        .attr("fill", "#94a3b8")
                        .attr("font-family", "Orbitron")
                        .attr("font-size", "8px")
                    );

                // Y-axis mapping
                const yAxis = d3.axisLeft(yScale)
                    .ticks(4)
                    .tickFormat(d => `${d}%`);

                g.append("g")
                    .attr("class", "y-axis")
                    .call(yAxis)
                    .call(g => g.select(".domain").attr("stroke", "#334155"))
                    .call(g => g.selectAll(".tick line").attr("stroke", "#334155"))
                    .call(g => g.selectAll(".tick text")
                        .attr("fill", "#94a3b8")
                        .attr("font-family", "Orbitron")
                        .attr("font-size", "8px")
                    );

                // Area under the trajectory line
                const areaGenerator = d3.area()
                    .x(d => xScale(d.index))
                    .y0(chartHeight)
                    .y1(d => yScale(d.winRate))
                    .curve(d3.curveMonotoneX);

                // Gradient setup
                const defs = svgElement.append("defs");
                const grad = defs.append("linearGradient")
                    .attr("id", "d3-winrate-area-grad")
                    .attr("x1", "0%")
                    .attr("y1", "0%")
                    .attr("x2", "0%")
                    .attr("y2", "100%");

                grad.append("stop")
                    .attr("offset", "0%")
                    .attr("stop-color", "#10b981")
                    .attr("stop-opacity", 0.35);

                grad.append("stop")
                    .attr("offset", "100%")
                    .attr("stop-color", "#10b981")
                    .attr("stop-opacity", 0.0);

                g.append("path")
                    .datum(chartData)
                    .attr("fill", "url(#d3-winrate-area-grad)")
                    .attr("d", areaGenerator);

                // Core line plotting selection
                const lineGenerator = d3.line()
                    .x(d => xScale(d.index))
                    .y(d => yScale(d.winRate))
                    .curve(d3.curveMonotoneX);

                g.append("path")
                    .datum(chartData)
                    .attr("fill", "none")
                    .attr("stroke", "#10b981")
                    .attr("stroke-width", 2.5)
                    .attr("stroke-linecap", "round")
                    .attr("d", lineGenerator);

                // Invisible Overlay capture for interactive tracking
                const overlay = g.append("rect")
                    .attr("width", chartWidth)
                    .attr("height", chartHeight)
                    .attr("fill", "transparent")
                    .style("pointer-events", "all");

                const hoverLine = g.append("line")
                    .attr("stroke", "#38bdf8")
                    .attr("stroke-width", 1.5)
                    .attr("stroke-dasharray", "3 3")
                    .style("display", "none");

                const hoverPointCircle = g.append("circle")
                    .attr("r", 5)
                    .attr("fill", "#38bdf8")
                    .attr("stroke", "#0a0e1a")
                    .attr("stroke-width", 2)
                    .style("display", "none");

                // Pointer events
                overlay.on("pointermove mousemove", function(e) {
                    const [mx] = d3.pointer(e);
                    const gameNum = Math.round(xScale.invert(mx));
                    const currentPoint = chartData.find(d => d.index === gameNum);

                    if (currentPoint) {
                        const cx = xScale(currentPoint.index);
                        const cy = yScale(currentPoint.winRate);

                        hoverLine
                            .attr("x1", cx)
                            .attr("y1", 0)
                            .attr("x2", cx)
                            .attr("y2", chartHeight)
                            .style("display", "initial");

                        hoverPointCircle
                            .attr("cx", cx)
                            .attr("cy", cy)
                            .style("display", "initial");

                        setHoveredPoint(currentPoint);
                    }
                });

                overlay.on("pointerleave mouseleave", function() {
                    hoverLine.style("display", "none");
                    hoverPointCircle.style("display", "none");
                    setHoveredPoint(null);
                });

            }, [chartData]);

            return (
                <div class="bg-surface rounded-xl border border-border p-5 flex flex-col justify-between space-y-4 shadow-xl">
                    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">

                    <div class="relative w-full bg-navyBg/40 rounded-xl p-2.5 border border-border/40 select-none">

        // ------------------------- MODULE 7: PERFORMANCE TRACKER -------------------------

                    else if (data.result === 'L') resultColor = 'text-danger font-bold';

                    return (
                        <div class="bg-surface border border-border p-3 rounded-xl shadow-2xl space-y-1 text-[11px]">

                        </div>

                }
                return null;
            };

            const stats = useMemo(() => {
                const total = matches.length;
                if (total === 0) return { total: 0, winRate: 0, bestForm: 'N/A', streak: 'None', pctWin: 0, streakClass: 'text-gray-400' };
                
                const wins = matches.filter(m => m.result === 'W').length;
                const winRate = Math.round((wins / total) * 100);

                let streakCount = 0;
                let activeType = null;
                for (let i = 0; i < matches.length; i++) {
                    const res = matches[i].result;
                    if (activeType === null) {
                        activeType = res;
                        streakCount = 1;
                    } else if (res === activeType) {
                        streakCount++;
                    } else {
                        break;
                    }
                }
                const streak = `${streakCount} ${activeType}`;
                const streakClass = activeType === 'W' ? 'text-success' : activeType === 'L' ? 'text-danger' : 'text-gray-400';

                // Best formation calculation
                const map = {};
                matches.forEach(m => {
                    if (m.result === 'W') map[m.myFormation] = (map[m.myFormation] || 0) + 1;
                });
                let best = 'N/A';
                let max = -1;
                Object.keys(map).forEach(f => {
                    if (map[f] > max) { max = map[f]; best = f; }
                });
                if (best === 'N/A') best = matches[0].myFormation;

                return { total, winRate, bestForm: best, streak, streakClass };
            }, [matches]);

            const logMatch = (e) => {
                e.preventDefault();
                let res = 'D';
                if (myScore > oppScore) res = 'W';
                else if (myScore < oppScore) res = 'L';

                const record = {
                    id: 'm_' + Date.now(),

                    opponentFormation: oppForm,

                    opponentGoals: oppScore,

                    possession: 50,
                    myShots: 6, onTarget: 4, oppShots: 6, oppOnTarget: 3,

                    matchType,
                    notes: 'Quick manual log record entered.'

                setMatches(prev => [record, ...prev]);
                triggerToast('Match successfully logged down!', 'success');

            const deleteMatch = (id) => {

                        </div>
                        <div class="bg-surface p-4 border border-border rounded-xl">

                            <form onSubmit={logMatch} class="space-y-4">

                                    <div>
                                        <select value={myForm} onChange={e => setMyForm(e.target.value)} class="w-full bg-surface2 border border-border rounded-lg text-xs p-2.5 outline-none text-white">
                                            {FORMATIONS.map(f => <option key={f} value={f}>{f}</option>)}

                                </div>

                            </form>
                        </div>

                        {/* Interactive custom line chart */}

                                <div class="w-full h-44 bg-navyBg/40 rounded-xl p-2 border border-border/40 flex items-center justify-center">
