        // ------------------------- MODULE 8: SCRIPT DETECTOR -------------------------
        function ScriptDetectorModule({ matches, triggerToast, isPro, setIsPro, setIsProModalOpen, t, language }) {
            const [postHitRate, setPostHitRate] = useState(0);
            const [gkSaveRate, setGkSaveRate] = useState(0);
            const [passFaultRate, setPassFaultRate] = useState(0);
            const [slowHeavy, setSlowHeavy] = useState(0);
            const [loading, setLoading] = useState(false);
            const [meterScore, setMeterScore] = useState(null);
            const [proCode, setProCode] = useState('');

            const handleAnalyze = () => {
                if (!isPro) {
                    setIsProModalOpen(true);
                    triggerToast('Real-time momentum symptoms detector requires PRO authorization!', 'warning');
                    return;
                }
                setLoading(true);
                
                setTimeout(() => {
                    setLoading(false);
                    // Standard deterministic computation based on manual inputs
                    const avg = Math.round((postHitRate * 10 + gkSaveRate * 10 + passFaultRate * 10 + slowHeavy * 10) / 4);
                    setMeterScore(avg);
                    triggerToast('Momentum swing metrics mapped out!', 'success');
                }, 1000);
            };

            const handleCodeVerify = (e) => {
                e.preventDefault();
                if (proCode.trim().toUpperCase() === 'PRO2026' || proCode.trim().toLowerCase() === 'pro') {
                    setIsPro(true);
                    triggerToast('PRO credentials confirmed! Momentum evaluation fully unlocked.', 'success');
                } else {
                    triggerToast('Invalid license code. Use key "PRO2026" or tap Simulated Upgrade!', 'error');
                }
            };

            return (
                <div class="space-y-6">
                    <div class="border-b border-border pb-4">
                        <h2 class="text-2xl font-bold font-orbitron text-white">🔮 {t('script_title')}</h2>
                        <p class="text-xs text-gray-400">Disclaimer: Momentum patterns represent simulated game engine behaviors. Educational only.</p>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        {/* Sliders Input */}
                        <div class="lg:col-span-5 bg-surface rounded-xl border border-border p-5 space-y-4">
                            <h3 class="text-md font-bold font-orbitron text-white mb-3">🛠️ Map Momentum Symptoms</h3>
                            
                            <div>
                                <div class="flex justify-between text-xs font-semibold text-gray-400 uppercase mb-1">
                                    <span>Shots hitting post/bar</span>
                                    <span class="text-primary font-bold">{postHitRate}/10</span>
                                </div>
                                <input type="range" min="0" max="10" value={postHitRate} onChange={e => setPostHitRate(parseInt(e.target.value))} class="w-full h-1.5 accent-primary bg-gray-700 rounded-lg appearance-none cursor-pointer"/>
                            </div>

                            <div>
                                <div class="flex justify-between text-xs font-semibold text-gray-400 uppercase mb-1">
                                    <span>GK making impossible savers</span>
                                    <span class="text-primary font-bold">{gkSaveRate}/10</span>
                                </div>
                                <input type="range" min="0" max="10" value={gkSaveRate} onChange={e => setGkSaveRate(parseInt(e.target.value))} class="w-full h-1.5 accent-primary bg-gray-700 rounded-lg appearance-none cursor-pointer"/>
                            </div>

                            <div>
                                <div class="flex justify-between text-xs font-semibold text-gray-400 uppercase mb-1">
                                    <span>My passes tags going wrong</span>
                                    <span class="text-primary font-bold">{passFaultRate}/10</span>
                                </div>
                                <input type="range" min="0" max="10" value={passFaultRate} onChange={e => setPassFaultRate(parseInt(e.target.value))} class="w-full h-1.5 accent-primary bg-gray-700 rounded-lg appearance-none cursor-pointer"/>
                            </div>

                            <div>
                                <div class="flex justify-between text-xs font-semibold text-gray-400 uppercase mb-1">
                                    <span>My players feel heavy / sluggish</span>
                                    <span class="text-primary font-bold">{slowHeavy}/10</span>
                                </div>
                                <input type="range" min="0" max="10" value={slowHeavy} onChange={e => setSlowHeavy(parseInt(e.target.value))} class="w-full h-1.5 accent-primary bg-gray-700 rounded-lg appearance-none cursor-pointer"/>
                            </div>

                            <button onClick={handleAnalyze} class="w-full bg-gradient-to-r from-primary to-secondary text-navyBg font-bold py-3 rounded-lg font-orbitron uppercase text-xs tracking-wider transition-all hover:brightness-110 flex items-center justify-center gap-2 cursor-pointer">
                                <span>{isPro ? '🔍' : '🔒'} Analyze Script metrics</span>
                            </button>
                        </div>

                        {/* Ring Meter Output */}
                        <div class="lg:col-span-7">
                            {!isPro ? (
                                <div class="bg-surface rounded-xl border border-border p-6 h-full flex flex-col justify-between relative overflow-hidden min-h-[350px]">
                                    {/* Blurred Background Preview simulating the actual layout */}
                                    <div class="absolute inset-0 filter blur-[6px] opacity-15 pointer-events-none select-none p-6 space-y-4">
                                        <h3 class="text-md font-bold font-orbitron text-white text-center">⚡ Momentum Shift Ratio</h3>
                                        <div class="w-24 h-24 mx-auto border-[10px] border-primary/40 rounded-full flex items-center justify-center">
                                            <span class="text-lg font-black font-orbitron text-white">45%</span>
                                        </div>
                                        <div class="p-3 bg-surface2 border border-border rounded-lg text-xs text-center">
                                            <p class="text-accent font-bold uppercase">⚠️ Secondary momentum shift noticed</p>
                                            <p class="text-gray-300 mt-1">Slow pass tempos immediately...</p>
                                        </div>
                                    </div>

                                    {/* Foreground Lock & Credentials Panel */}
                                    <div class="z-10 flex flex-col items-center justify-center text-center space-y-4 my-auto font-sans">
                                        <div class="w-14 h-14 bg-gradient-to-br from-primary/20 to-secondary/30 border border-primary/40 rounded-full flex items-center justify-center text-2xl animate-pulse">
                                            🔒
                                        </div>
                                        <div>
                                            <h4 class="text-base font-black font-orbitron uppercase text-yellow-300 tracking-wider">Premium Momentum Analysis Gated</h4>
                                            <p class="text-xs text-gray-300 max-w-sm mt-1 leading-relaxed">
                                                Activate <strong>PRO Mode</strong> to unlock live simulated handicap calculation, pass error multipliers, and real-time counter-momentum recommendations.
                                            </p>
                                        </div>

                                        {/* Verification form */}
                                        <form onSubmit={handleCodeVerify} class="w-full max-w-xs bg-surface2/80 backdrop-blur-md p-4 rounded-xl border border-border/60 space-y-3">
                                            <div class="text-left font-sans">
                                                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-wide mb-1 text-center sm:text-left">Verify Pro Credentials</label>
                                                <div class="flex gap-1.5">
                                                    <input 
                                                        type="text" 
                                                        value={proCode} 
                                                        onChange={e => setProCode(e.target.value)} 
                                                        placeholder="Enter passcode (e.g., PRO2026)" 
                                                        class="flex-1 bg-surface border border-border hover:border-gray-700 focus:border-primary/50 text-xs px-2.5 py-2 rounded-lg text-white font-mono outline-none"
                                                    />
                                                    <button type="submit" class="bg-primary hover:brightness-115 text-navyBg font-black text-[10px] font-orbitron px-3 py-2 rounded-lg transition-all cursor-pointer">
                                                        VERIFY
                                                    </button>
                                                </div>
                                                <p class="text-[8px] text-gray-500 mt-1 text-center">Demo Passcode: <span class="text-primary font-mono select-all font-bold">PRO2026</span></p>
                                            </div>
                                        </form>

                                        <div class="flex items-center gap-3 w-full max-w-xs">
                                            <div class="h-[1px] bg-border/40 flex-1"></div>
                                            <span class="text-[9px] text-gray-500 uppercase font-black">Or</span>
                                            <div class="h-[1px] bg-border/40 flex-1"></div>
                                        </div>

                                        <button 
                                            onClick={() => setIsProModalOpen(true)}
                                            class="w-full max-w-xs bg-gradient-to-r from-primary/10 to-secondary/15 hover:from-primary/20 hover:to-secondary/25 text-primary border border-primary/30 font-bold font-orbitron text-xs py-2 rounded-xl transition-all cursor-pointer tracking-wider"
                                        >
                                            👑 Request Pro Upgrade Modal
                                        </button>
                                    </div>
                                </div>
                            ) : loading ? (
                                <div class="bg-surface rounded-xl border border-border p-12 text-center flex flex-col items-center justify-center h-full min-h-[300px]">
                                    <div class="w-12 h-12 border-4 border-dashed border-primary rounded-full animate-spin mb-4"></div>
                                    <p class="font-bold font-orbitron text-white">EVALUATING SCRIPT FLUIDITY TAGS...</p>
                                </div>
                            ) : meterScore !== null ? (
                                <div class="bg-surface rounded-xl border border-border p-5 text-center space-y-4">
                                    <h3 class="text-md font-bold font-orbitron text-white">⚡ Momentum Shift Ratio</h3>
                                    
                                    <div class="relative w-40 h-40 mx-auto flex items-center justify-center">
                                        <svg class="w-full h-full transform -rotate-90">
                                            <circle cx="80" cy="80" r="70" class="stroke-gray-800" stroke-width="12" fill="transparent"/>
                                            <circle cx="80" cy="80" r="70" 
                                                class={`${meterScore > 60 ? 'stroke-danger' : meterScore > 35 ? 'stroke-accent' : 'stroke-success'}`} 
                                                stroke-width="12" 
                                                stroke-dasharray="439.8" 
                                                stroke-dashoffset={439.8 - (439.8 * meterScore) / 100} 
                                                fill="transparent"
                                                stroke-linecap="round"/>
                                        </svg>
                                        <span class="absolute text-4xl font-black font-orbitron text-white">{meterScore}%</span>
                                    </div>

                                    <div class="p-3 bg-surface2 border border-border rounded-lg text-xs">
                                        {meterScore > 60 ? (
                                            <p class="text-danger font-bold uppercase tracking-wider">⚠️ Critical simulated momentum active</p>
                                        ) : meterScore > 35 ? (
                                            <p class="text-accent font-bold uppercase tracking-wider">⚠️ Secondary momentum shift noticed</p>
                                        ) : (
                                            <p class="text-success font-bold uppercase tracking-wider">✔️ Fluid balanced engine environment</p>
                                        )}
                                        <p class="text-gray-300 mt-1.5 leading-relaxed">Ensure to slow pass tempos immediately if momentum goes over 40% to safeguard CB jumping positions.</p>
                                    </div>
                                </div>
                            ) : (
                                <div class="bg-surface rounded-xl border border-border p-8 text-center text-gray-500 h-full flex flex-col items-center justify-center min-h-[300px]">
                                    <span class="text-4xl mb-2">🔮</span>
                                    <h4 class="font-bold text-white mb-1">Awaiting Engine Evaluation</h4>
                                    <p class="text-xs max-w-sm">Requires active <strong>PRO Mode</strong>. Map key gameplay parameters on the left panel to trigger momentum calculation checks.</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // Render React Application
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
